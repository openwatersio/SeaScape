name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
  EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
  EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v6

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Lint
        run: npm run lint

      - name: 🔍 Typecheck
        run: npx tsc --noEmit

      - name: 🧪 Test
        run: npm test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - platform: android
            runs-on: ubuntu-latest
          - platform: ios
            runs-on: macos-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v6

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: 📦 Install dependencies
        run: |
          npm install
          npm i -g eas-cli@latest

      - name: 📱 Setup EAS build cache
        uses: actions/cache@v5
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-local-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-local-

      - name: 📱 Build Development APK
        if: matrix.platform == 'android'
        run: |
          export NODE_OPTIONS="--max_old_space_size=4096"
          eas build --platform android --profile development --local --non-interactive --output=./app-dev.apk
        env:
          NODE_ENV: development

      - name: 📱 Build Production APK
        if: matrix.platform == 'android'
        run: |
          export NODE_OPTIONS="--max_old_space_size=4096"
          eas build --platform android --profile production-apk --local --non-interactive --output=./app-prod.apk
        env:
          NODE_ENV: production

      - name: 📱 Build iOS Development
        if: matrix.platform == 'ios'
        run: |
          export NODE_OPTIONS="--max_old_space_size=4096"
          eas build --platform ios --profile development --local --non-interactive --output=./app-ios-dev.app
        env:
          NODE_ENV: development

      - name: 📱 Build iOS Production
        if: matrix.platform == 'ios'
        run: |
          export NODE_OPTIONS="--max_old_space_size=4096"
          eas build --platform ios --profile production --local --non-interactive --output=./app-ios-prod.ipa
        env:
          NODE_ENV: production

      - name: 📦 Upload build artifacts to GitHub
        uses: actions/upload-artifact@v6
        with:
          name: app-builds-${{ matrix.platform }}
          path: |
            ./app-dev.apk
            ./app-prod.apk
            ./app-ios-dev.app
            ./app-ios-prod.ipa
          retention-days: 7
